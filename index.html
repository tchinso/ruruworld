<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Floor Escape Prototype</title>
    <link rel="stylesheet" href="./src/styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.181.2/build/three.module.js",
          "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.181.2/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="app">
      <canvas id="game"></canvas>

      <div class="hud hud-main" aria-live="polite">
        <div class="floor-chip">
          <span class="label">현재 위치</span>
          <strong id="floorValue">옥상 스테이지</strong>
        </div>
        <div class="stat-row">
          <span>동료</span>
          <strong id="friendValue">0 / 12</strong>
        </div>
        <div class="stat-row">
          <span>목표</span>
          <strong id="nextValue">-</strong>
        </div>
      </div>

      <div class="hud roster">
        <div class="roster-title">동료</div>
        <div id="rosterList" class="roster-list"></div>
      </div>

      <div class="hud motion-readout">
        <span id="motionName">Player</span>
        <strong id="motionState">idle</strong>
      </div>

      <div class="hud controls">
        <button id="skipButton" type="button" aria-label="다음 단계">N</button>
        <button id="resetButton" type="button" aria-label="처음부터 다시 시작">R</button>
      </div>

      <div id="rhythmHud" class="hud rhythm-hud hidden" aria-live="polite">
        <div class="rhythm-heading">
          <span id="rhythmSong">ガンパウダー · Normal</span>
          <strong id="rhythmStatus">공연 준비</strong>
        </div>
        <div class="life-meter">
          <span id="rhythmLifeFill"></span>
        </div>
        <div class="rhythm-stats">
          <div>
            <span>Life</span>
            <strong id="rhythmLifeText">100 / 100</strong>
          </div>
          <div>
            <span>Judge</span>
            <strong id="rhythmJudge">Ready</strong>
          </div>
          <div>
            <span>Combo</span>
            <strong id="rhythmCombo">0</strong>
          </div>
          <div>
            <span>Keys</span>
            <strong id="rhythmKeys">Z X N M</strong>
          </div>
        </div>
      </div>

      <div id="survivalHud" class="hud rhythm-hud survival-hud hidden" aria-live="polite">
        <div class="rhythm-heading">
          <span id="survivalSong">FanArt · 치료약 생존</span>
          <strong id="survivalStatus">중앙 원에서 E</strong>
        </div>
        <div class="life-meter survival-meter">
          <span id="survivalHealthFill"></span>
        </div>
        <div class="rhythm-stats">
          <div>
            <span>Health</span>
            <strong id="survivalHealthText">100 / 100</strong>
          </div>
          <div>
            <span>Medicine</span>
            <strong id="survivalMeds">0개</strong>
          </div>
          <div>
            <span>Time</span>
            <strong id="survivalTime">--:--</strong>
          </div>
          <div>
            <span>Goal</span>
            <strong id="survivalHint">중앙 원 E</strong>
          </div>
        </div>
      </div>

      <div id="gothicHud" class="hud rhythm-hud gothic-hud hidden" aria-live="polite">
        <div class="rhythm-heading">
          <span id="gothicSong">Kuroiyume · 기억 대결</span>
          <strong id="gothicStatus">Z로 시작</strong>
        </div>
        <div class="life-meter gothic-meter">
          <span id="gothicProgressFill"></span>
        </div>
        <div class="rhythm-stats">
          <div>
            <span>Round</span>
            <strong id="gothicRound">1 / 17</strong>
          </div>
          <div>
            <span>Length</span>
            <strong id="gothicLength">1</strong>
          </div>
          <div>
            <span>Input</span>
            <strong id="gothicInput">-</strong>
          </div>
          <div>
            <span>Keys</span>
            <strong id="gothicKeys">Z X C V B N M</strong>
          </div>
        </div>
      </div>

      <div id="message" class="message hidden"></div>

      <div id="popup" class="popup hidden" role="dialog" aria-modal="true" aria-labelledby="popupTitle">
        <div class="popup-panel">
          <strong id="popupTitle">옥상 스테이지</strong>
          <p id="popupBody"></p>
          <div class="popup-actions">
            <button id="popupPrimary" type="button">확인</button>
            <button id="popupSecondary" type="button" class="hidden">닫기</button>
          </div>
        </div>
      </div>

      <div id="loading" class="loading">
        <strong>모델 불러오는 중</strong>
        <span id="loadingDetail">0 / 13</span>
      </div>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
